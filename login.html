<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0b1220;
            color: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at top, rgba(84, 115, 213, 0.22), transparent 28%),
                        linear-gradient(180deg, #0f172a 0%, #020617 100%);
        }

        .login-shell {
            width: min(420px, calc(100% - 32px));
            padding: 38px 34px;
            border-radius: 28px;
            background: rgba(15, 23, 42, 0.95);
            box-shadow: 0 32px 80px rgba(15, 23, 42, 0.28);
            border: 1px solid rgba(148, 163, 184, 0.16);
        }

        .login-shell h2 {
            margin: 0 0 24px;
            font-size: 1.95rem;
            letter-spacing: -0.04em;
            color: #eff6ff;
        }

        .form-group {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            min-height: 50px;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(15, 23, 42, 0.75);
            color: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
        }

        input:focus {
            border-color: #64748b;
            background: rgba(15, 23, 42, 0.92);
            transform: translateY(-1px);
        }

        .submit-button {
            width: 100%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            padding: 15px 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #4f46e5, #22d3ee);
            color: #f8fafc;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
            box-shadow: 0 18px 42px rgba(34, 211, 238, 0.18);
        }

        .submit-button:hover {
            transform: translateY(-1px);
            opacity: 0.98;
            box-shadow: 0 22px 52px rgba(34, 211, 238, 0.22);
        }

        .note {
            margin-top: 18px;
            font-size: 0.9rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        @media (max-width: 420px) {
            .login-shell {
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>
    <section class="login-shell">
        <h2>Đăng nhập</h2>
        <form action="/login" method="post">
            <div class="form-group">
                <label for="username">Tên đăng nhập</label>
                <input id="username" type="text" name="username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input id="password" type="password" name="password" required autocomplete="current-password">
            </div>
            <button class="submit-button" type="submit">Gửi</button>
        </form>
        <p class="note">Đăng nhập an toàn với giao diện hiện đại, tối và dễ dùng.</p>
    </section>
</body>
</html>
